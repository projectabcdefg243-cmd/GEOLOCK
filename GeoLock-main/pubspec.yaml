name: geolock
description: A Flutter app that encrypts PDF files with location and time constraints
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Location services
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # PDF handling
  pdf: ^3.10.7
  path_provider: ^2.1.2
  file_picker: ^8.1.2
  url_launcher: ^6.2.5
  flutter_pdfview: ^1.3.2
  share_plus: ^7.2.2
  
  # Encryption
  crypto: ^3.0.3
  encrypt: ^5.0.3
  
  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  
  # Storage
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

